{% load static %}
<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему — MUSERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #131315;
            --bg-surface: #201f21;
            --bg-surface-high: #2a2a2c;
            --text-primary: #e5e1e4;
            --text-muted: #b9cacb;
            --primary: #00dbe9;
            --primary-dim: #004f54;
            --glass-bg: rgba(32, 31, 33, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: 12px;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --space-sm: 16px;
            --space-md: 24px;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Manrope', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-md);
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: var(--space-md);
        }
        
        .login-logo .material-symbols-outlined {
            font-size: 48px;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(0, 219, 233, 0.4);
        }
        
        .login-logo h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            color: var(--primary);
            margin-top: var(--space-sm);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }
        
        .login-form {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: var(--space-md);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        
        .form-group {
            margin-bottom: var(--space-md);
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 219, 233, 0.2);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #00b8c4);
            color: #000;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(0, 219, 233, 0.3);
        }
        
        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(0, 219, 233, 0.5);
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--text-error);
            padding: 12px;
            border-radius: var(--radius-md);
            margin-bottom: var(--space-md);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .login-footer {
            text-align: center;
            margin-top: var(--space-md);
            color: var(--text-muted);
            font-size: 12px;
        }
        
        .login-footer a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <span class="material-symbols-outlined">graphic_eq</span>
            <h1>MUSERP</h1>
            <p style="color: var(--text-muted); margin-top: 8px;">CRM для музыкальной школы</p>
        </div>
        
        <form method="post" class="login-form">
            {% csrf_token %}
            
            {% if error %}
            <div class="error-message">
                <span class="material-symbols-outlined">error</span>
                {{ error }}
            </div>
            {% endif %}
            
            <div class="form-group">
                <label for="username">Логин</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn-login">
                <span class="material-symbols-outlined">login</span>
                Войти
            </button>
        </form>
        
        <div class="login-footer">
            <p>Демо-доступ: admin / admin123</p>
        </div>
    </div>
</body>
</html>
